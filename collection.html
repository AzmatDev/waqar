<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WAQĀR — Collection</title>

    <link rel="icon" type="image/png" sizes="32x32" href="images/favicon/favicon-32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="images/favicon/favicon-16.png">
    <link rel="apple-touch-icon" href="images/favicon/apple-touch-icon.png">

    <meta property="og:type" content="website">
    <meta property="og:title" content="WAQĀR — Nos collections">
    <meta property="og:description" content="Jubbas et Sarouels conformes à la Sunnah, confectionnés avec soin en Turquie.">
    <meta property="og:image" content="https://waqar-sigma.vercel.app/images/jubba_blk.png">

    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/cart.css">
    <link rel="stylesheet" href="css/collection.css">
</head>
<body>

<nav>
    <a href="/" class="nav-logo">
        <img src="images/logo_waqar.jpeg" alt="WAQĀR" class="nav-logo-img">
    </a>
    <ul>
        <li><a href="/#collection">Collections</a></li>
        <li><a href="/#accessoires">Accessoires</a></li>
        <li><a href="/#contact-section">Contact</a></li>
    </ul>
    <button type="button" class="nav-cart-btn" onclick="cartOpen()" aria-label="Panier">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <path d="M6 7h12l-1 13a1 1 0 0 1-1 1H8a1 1 0 0 1-1-1L6 7z"/>
            <path d="M9 7V5a3 3 0 0 1 6 0v2"/>
        </svg>
        <span class="cart-badge" id="cart-badge" style="display:none;">0</span>
    </button>
</nav>

<section class="collection-page collection-page--split">
    <div class="collection-intro">
        <span class="collection-hero-tag">Collection</span>
        <h1 class="collection-hero-title" id="collection-page-title">Collection</h1>
        <p class="collection-hero-sub" id="collection-page-sub"></p>
        <p class="collection-hero-meta" id="collection-page-meta"></p>
        <div id="tabs-wrapper" class="collection-tabs-wrap fade-in">
            <div class="collection-tabs">
                <button class="tab-btn active" data-cat="adulte" onclick="filterProducts('adulte',this)">Adulte</button>
                <button class="tab-btn" data-cat="enfant" onclick="filterProducts('enfant',this)">Enfant</button>
            </div>
        </div>
    </div>

    <div class="products-grid" id="products-grid"></div>
</section>

<section class="savez-full fade-in">
    <div class="savez-full-inner">
        <span class="savez-label-side" id="savez-label">Le saviez-vous ?</span>
        <h3 class="savez-title-side" id="savez-title"></h3>
        <p class="savez-text-side" id="savez-text1"></p>
        <p class="savez-text-side" id="savez-text2"></p>
        <div class="savez-divider-side"></div>
        <p class="savez-quote-side" id="savez-quote"></p>
    </div>
</section>

<footer>
    <span class="footer-logo">WAQĀR — ١٤٤٧</span>
    <p class="footer-devise">« Porter la Sunnah avec dignité »</p>
    <p>Confection artisanale · Turquie · Expédition internationale</p>
    <div class="footer-bottom">
        <span>© 1448 / 2026 WAQĀR</span>
        <div class="legal-links">
            <a href="mentions-legales.html">Mentions légales</a>
            <a href="confidentialite.html">Confidentialité</a>
            <a href="cgv.html">CGV</a>
        </div>
    </div>
</footer>

<script src="js/products-data.js"></script>
<script src="js/cart.js"></script>
<script src="js/collection.js"></script>
</body>
</html>
