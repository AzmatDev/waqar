<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WAQĀR — Produit</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/product.css">
</head>
<body>

<nav>
    <a href="index.html" class="nav-logo">
        <img src="images/logo_waqar_2.jpeg" alt="WAQĀR" class="nav-logo-img">
    </a>
    <ul>
        <li><a href="index.html#sunnah">Sunnah</a></li>
        <li><a href="index.html#collection">Collection</a></li>
        <li><a href="index.html#about">À propos</a></li>
        <li><a href="index.html#commande">Commander</a></li>
    </ul>
</nav>

<div class="product-nav-cat">
    <button class="product-cat-btn" id="btn-adulte" onclick="switchCat('adulte')">Adulte</button>
    <button class="product-cat-btn" id="btn-enfant" onclick="switchCat('enfant')">Enfant</button>
</div>

<div class="product-page">

    <!-- GAUCHE : image + miniatures -->
    <div class="product-left">
        <div class="product-main-img">
            <img id="main-img" src="" alt="">
        </div>
    </div>

    <!-- DROITE : infos + commande -->
    <div class="product-right">
        <span class="product-cat" id="product-cat"></span>
        <h1 class="product-title" id="product-title"></h1>

        <p class="product-prix">
            <span class="prix-barre" id="prix-barre"></span>
            <span class="prix-actuel" id="prix-actuel"></span>
        </p>

        <span class="product-coloris-label">Coloris</span>
        <div class="product-coloris" id="product-coloris"></div>

        <span class="product-taille-label">Choisir une taille</span>
        <div class="product-tailles">
            <button class="taille-btn" onclick="selectTaille(this)">S</button>
            <button class="taille-btn" onclick="selectTaille(this)">M</button>
            <button class="taille-btn" onclick="selectTaille(this)">L</button>
        </div>

        <div class="product-divider"></div>
        <p class="product-desc" id="product-desc"></p>

        <div class="product-sunnah">
            <p>✦ Longueur aux chevilles · Ample et couvrant · Sans logo ostentatoire · Conforme à la Sunnah du Prophète ﷺ</p>
        </div>

        <button class="btn-precommande" onclick="precommander()">Précommander →</button>
        <p class="product-note">Vous serez contacté par email pour confirmer votre commande et le paiement.</p>
    </div>
</div>
<script src="js/product.js"></script>
</body>
</html>
